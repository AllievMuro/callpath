<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="cp-text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#E0FCFF"/>
    <stop offset="60%" stop-color="#06B6D4"/>
    <stop offset="100%" stop-color="#22D3EE"/>
  </linearGradient>
  <linearGradient id="cp-accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#06B6D4"/>
    <stop offset="100%" stop-color="#22D3EE"/>
  </linearGradient>
  <filter id="cp-glow">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="512" height="512" rx="96" fill="#050505"/>

<!-- Subtle grid lines for API/data vibe -->
<line x1="0" y1="200" x2="512" y2="200" stroke="#06B6D4" stroke-opacity="0.05" stroke-width="1"/>
<line x1="0" y1="312" x2="512" y2="312" stroke="#06B6D4" stroke-opacity="0.05" stroke-width="1"/>
<line x1="160" y1="0" x2="160" y2="512" stroke="#06B6D4" stroke-opacity="0.05" stroke-width="1"/>
<line x1="352" y1="0" x2="352" y2="512" stroke="#06B6D4" stroke-opacity="0.05" stroke-width="1"/>

<!-- Main wordmark -->
<text
  x="256"
  y="282"
  font-family="'Inter','Helvetica Neue',Arial,sans-serif"
  font-weight="800"
  font-size="78"
  letter-spacing="-4"
  text-anchor="middle"
  fill="url(#cp-text-grad)"
  filter="url(#cp-glow)"
>Callpath</text>

<!-- Accent: colored underline bar beneath wordmark, with a small gap/cut in the middle suggesting a path split -->
<rect x="68" y="295" width="170" height="3" rx="1.5" fill="url(#cp-accent-grad)" opacity="0.9"/>
<rect x="274" y="295" width="170" height="3" rx="1.5" fill="url(#cp-accent-grad)" opacity="0.9"/>

<!-- Small dot in the gap — path node symbol -->
<circle cx="256" cy="296.5" r="4" fill="#22D3EE" filter="url(#cp-glow)"/>

<!-- Tagline in monospace -->
<text
  x="256"
  y="338"
  font-family="'JetBrains Mono','Fira Mono','Courier New',monospace"
  font-weight="400"
  font-size="11"
  letter-spacing="1.5"
  text-anchor="middle"
  fill="#06B6D4"
  opacity="0.75"
>decoded API · no ABI hunting</text>
</svg>